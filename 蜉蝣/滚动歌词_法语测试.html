<!doctype html>
<html lang="zh-CN">
<head>

<title>Ephémères - 滚动歌词</title>
<style>
:root {
  --bg: #f6f3ee; --panel: #fffdfa; --ink: #252525; --muted: #6d6a64;
  --line: #ded8ce; --accent: #c83f3f; --accent-2: #19736b; --shadow: 0 18px 45px rgba(37,37,37,.10);
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; color: var(--ink); background: var(--bg); }
.app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
header { padding: 22px clamp(18px, 4vw, 44px) 14px; border-bottom: 1px solid var(--line); background: rgba(255,253,250,.92); position: sticky; top: 0; z-index: 5; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; max-width: 1180px; margin: 0 auto; }
.title h1 { margin: 0; font-size: 24px; line-height: 1.2; letter-spacing: 0; }
.title p { margin: 7px 0 0; color: var(--muted); font-size: 13px; }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
button, .file-label { appearance: none; border: 1px solid var(--line); background: var(--panel); color: var(--ink); height: 38px; padding: 0 13px; border-radius: 8px; font: inherit; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
button:hover, .file-label:hover { border-color: #c9bfb0; }
button.primary { background: var(--accent); color: white; border-color: var(--accent); min-width: 84px; justify-content: center; }
input[type="file"] { display: none; }
main { max-width: 1180px; width: 100%; margin: 0 auto; padding: 22px clamp(14px, 4vw, 44px) 24px; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; min-height: 0; }
.stage { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); min-height: calc(100vh - 190px); max-height: calc(100vh - 190px); overflow: hidden; position: relative; }
.lyrics { height: 100%; overflow-y: auto; scroll-behavior: smooth; padding: 34vh 34px 36vh; }
.line { max-width: 760px; margin: 0 auto 28px; padding: 16px 18px; border-left: 3px solid transparent; border-radius: 8px; opacity: .48; transform: scale(.985); transition: opacity .22s ease, transform .22s ease, background .22s ease, border-color .22s ease; }
.line.active { opacity: 1; transform: scale(1); background: #fff7f2; border-color: var(--accent); }
.jp { font-size: 24px; line-height: 1.55; font-weight: 700; }
.line.active .jp { font-size: 30px; }
.aligned-lyrics { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; column-gap: 14px; row-gap: 10px; }
.line.active .aligned-lyrics { column-gap: 16px; }
.word-pair { display: inline-flex; flex-direction: column; align-items: center; min-width: max-content; text-align: center; }
.word-text { font-size: 24px; line-height: 1.25; font-weight: 700; }
.line.active .word-text { font-size: 30px; }
.phonetic { margin-top: 3px; color: var(--accent-2); font-size: 15px; line-height: 1.25; font-weight: 500; white-space: nowrap; }
.line.active .phonetic { font-size: 17px; }
.romaji { margin-top: 8px; color: var(--accent-2); font-size: 16px; line-height: 1.55; }
.romaji strong { color: #0f5f59; font-weight: 800; }
.romaji em { color: #8b5e27; font-style: italic; }
.translation { margin-top: 8px; color: #4c4840; font-size: 17px; line-height: 1.55; }
.notes { margin-top: 12px; padding-top: 10px; border-top: 1px solid #eadfd4; color: #5c5147; font-size: 14px; line-height: 1.75; }
.notes div { margin: 3px 0; }
.side { display: flex; flex-direction: column; gap: 14px; }
.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
.panel h2 { margin: 0 0 12px; font-size: 15px; }
.toggles { display: grid; gap: 10px; }
.toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 14px; }
.switch { width: 48px; height: 26px; border-radius: 999px; border: 1px solid #cfc5b7; background: #e8e0d6; position: relative; cursor: pointer; flex: 0 0 auto; }
.switch::after { content: ""; position: absolute; width: 20px; height: 20px; left: 2px; top: 2px; border-radius: 50%; background: white; box-shadow: 0 1px 3px rgba(0,0,0,.20); transition: transform .18s ease; }
.switch.on { background: var(--accent-2); border-color: var(--accent-2); }
.switch.on::after { transform: translateX(22px); }
.now { color: var(--muted); font-size: 13px; line-height: 1.6; }
.now strong { display: block; color: var(--ink); font-size: 18px; margin-bottom: 8px; }
.current-notes { margin-top: 10px; color: #574c43; font-size: 14px; line-height: 1.7; }
footer { border-top: 1px solid var(--line); background: rgba(255,253,250,.96); padding: 13px clamp(18px, 4vw, 44px); }
.transport { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 14px; }
.time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; min-width: 102px; text-align: right; }
.progress { width: 100%; accent-color: var(--accent); }
body.hide-romaji .romaji, body.hide-translation .translation, body.hide-notes .notes { display: none; }
body.hide-romaji .phonetic { display: none; }
@media (max-width: 860px) { .topbar { align-items: flex-start; flex-direction: column; } .controls { justify-content: flex-start; } main { grid-template-columns: 1fr; } .stage { min-height: 58vh; max-height: 58vh; } .lyrics { padding-left: 16px; padding-right: 16px; } .line { padding: 14px; margin-bottom: 20px; } .jp, .word-text { font-size: 21px; } .line.active .jp, .line.active .word-text { font-size: 24px; } .transport { grid-template-columns: auto 1fr; } .time { grid-column: 1 / -1; text-align: left; } }
</style>
</head>

</div><audio id="audio" src="音频.mp3"></audio><script id="lyric-data" type="application/json">{"title": "Ephémères", "subtitle": "蜉蝣 / 作词: Elisabeth ANAIS / 作曲: Richard COCCIANTE", "items": [{"japanese": "On veut croire à des choses éternelles", "romaji": "[ɔ̃] [vф] [krwar] [a] [de] [ʃoz] [etεrnεl]", "translation": "我们愿意相信那些永恒之物", "notes": ["① on（[ɔ̃]）：不定代词，常口语化地代替 `nous`，这里可理解为“我们”。", "② veut（[vф]）：`vouloir` 的直陈式现在时第三人称单数；`on` 作主语时动词用第三人称单数，意为“想要、愿意”。", "③ croire（[krwar]）：动词不定式，意为“相信”；`vouloir + infinitif` 表示“想要做某事”。", "④ à des choses éternelles：`croire à` 表示“相信某事物的存在/价值”；`éternelles` 为阴性复数，修饰 `choses`。"], "time": 2.99, "end": 9.03}, {"japanese": "Pour oublier toutes ces choses précaires", "romaji": "[pur] [ublije] [tut] [se] [ʃoz] [prekεr]", "translation": "以便遗忘所有这些易逝之物", "notes": ["① pour（[pur]）：介词，引出目的，“为了、以便”。", "② oublier（[ublije]）：动词不定式，意为“忘记、遗忘”。", "③ toutes ces choses：`toutes` 为阴性复数，强调“所有”；`ces` 是指示限定词“这些”。", "④ précaires（[prekεr]）：形容词复数，意为“不稳定的、脆弱的、短暂的”，修饰 `choses`。"], "time": 9.03, "end": 13.37}, {"japanese": "Qui encombrent la Terre et le ciel", "romaji": "[ki] [ɑ̃kɔ̃br] [la] [tεr] [e] [lə] [sjεl]", "translation": "那些堵塞大地与天空的事物", "notes": ["① qui（[ki]）：关系代词，指代前句 `ces choses précaires`，作从句主语。", "② encombrent（[ɑ̃kɔ̃br]）：`encombrer` 的直陈式现在时第三人称复数，意为“堵塞、占满、妨碍”，主语为复数的 `choses`。", "③ la Terre（[la tεr]）：阴性名词，可指“地球”或“大地”；大写时偏“地球”。", "④ le ciel（[lə sjεl]）：阳性名词，“天空”；`la Terre et le ciel` 构成天地对照。"], "time": 13.37, "end": 17.6}, {"japanese": "Les poèmes et les dictionnaires", "romaji": "[le] [pɔεm] [e] [le] [diksjɔnεr]", "translation": "诗歌与词典", "notes": ["① les（[le]）：定冠词复数，表示一类事物。", "② poèmes（[pɔεm]）：阳性复数名词，“诗、诗篇”。", "③ dictionnaires（[diksjɔnεr]）：阳性复数名词，“词典”。", "④ 本行无谓语，属于歌词中的名词短语延展，承接前面对“永恒之物”的列举。"], "time": 17.6, "end": 22.05}, {"japanese": "Car nous sommes", "romaji": "[kar] [nu] [sɔm]", "translation": "因为我们", "notes": ["① car（[kar]）：连词，意为“因为”，语气比 `parce que` 更书面。", "② nous（[nu]）：第一人称复数主语代词，“我们”。", "③ sommes（[sɔm]）：`être` 的直陈式现在时第一人称复数，意为“我们是”。", "④ 句子未在本行完成，下一行 `Éphémères` 作表语。"], "time": 22.05, "end": 24.85}, {"japanese": "Éphémères", "romaji": "[efemεr]", "translation": "如蜉蝣，转瞬即逝", "notes": ["① éphémères（[efemεr]）：形容词复数，意为“短暂的、朝生暮死的”；也可作名词指“蜉蝣”。", "② 这里承接 `nous sommes`，作表语，说明“我们是短暂的存在”。", "③ 词源来自希腊语，核心含义是“只持续一天的”，很贴合蜉蝣意象。"], "time": 24.85, "end": 27.28}, {"japanese": "Menacés par une fin prochaine", "romaji": "[mənase] [par] [yn] [fɛ̃] [prɔʃεn]", "translation": "被临近的终结威胁着", "notes": ["① menacés（[mənase]）：`menacer` 的过去分词阳性复数，作形容词，意为“被威胁的”；与省略的 `nous` 阳性/混合复数一致。", "② par（[par]）：介词，引出被动意义中的施事或原因，“被、由”。", "③ fin（[fɛ̃]）：阴性名词，“终结、结局”；鼻化元音 `[ɛ̃]`。", "④ prochaine（[prɔʃεn]）：阴性单数形容词，“临近的、即将到来的”，修饰 `fin`。"], "time": 27.28, "end": 31.35}, {"japanese": "Les explosions en chaîne", "romaji": "[lez] [εksplozjɔ̃z] [ɑ̃] [ʃεn]", "translation": "像连续爆炸的火花", "notes": ["① explosions（[εksplozjɔ̃]）：阴性复数名词，“爆炸”；前接 `les` 时可有联诵 `[lez εks...]`。", "② en chaîne（[ɑ̃ ʃεn]）：固定表达，“连锁地、连续地”。", "③ chaîne（[ʃεn]）：阴性名词，“链条”；在表达中强调一个接一个发生。", "④ 本行是名词短语，画面化地补充“短暂、脆弱”的状态。"], "time": 31.35, "end": 35.73}, {"japanese": "Les amours et les gloires, passagères", "romaji": "[lez] [amurz] [e] [le] [glwar] [pasaƷεr]", "translation": "爱情和荣光，都是过客", "notes": ["① amours（[amur]）：复数时文学语境中可偏阴性；这里指“爱情、恋情”。", "② gloires（[glwar]）：阴性复数名词，“荣耀、荣光”。", "③ passagères（[pasaƷεr]）：阴性复数形容词，“短暂的、过路的”，同时修饰 `amours` 和 `gloires`。", "④ `les amours` 前的 `les` 与元音开头的 `amours` 可联诵为 `[lez amur]`。"], "time": 35.73, "end": 42.27}, {"japanese": "Éphémères", "romaji": "[efemεr]", "translation": "如蜉蝣，转瞬即逝", "notes": ["① 重复副歌核心词，强化“短暂性”这一主题。", "② 作形容词时复数形式书写为 `éphémères`，发音与单数相同。", "③ 末尾 `s` 不发音。"], "time": 42.27, "end": 45.18}, {"japanese": "Avoir la sagesse nécessaire", "romaji": "[avwar] [la] [saƷεs] [nesesεr]", "translation": "拥有必要的智慧", "notes": ["① avoir（[avwar]）：动词不定式，“拥有、有”。", "② sagesse（[saƷεs]）：阴性名词，“智慧”；常指理性、节制、明智。", "③ nécessaire（[nesesεr]）：形容词，“必要的”；此处阴性单数形式与阳性同形。", "④ 本行是不定式短语，和后文 `de prendre...`、`et savoir...` 共同说明应具备的生活态度。"], "time": 45.18, "end": 49.32}, {"japanese": "De prendre un peu tout à la légère", "romaji": "[də] [prɑ̃dr] [œ̃] [pф] [tu] [a] [la] [leƷεr]", "translation": "把一切稍微看轻一些", "notes": ["① prendre（[prɑ̃dr]）：动词不定式，“拿、采取、理解为”；这里用于表达看待事物的方式。", "② un peu（[œ̃ pф]）：副词短语，“一点、稍微”。", "③ tout（[tu]）：不定代词，“一切”。", "④ prendre à la légère：固定表达，“轻看、不太当回事”；`légère` 是阴性单数形容词，因固定短语中搭配 `la`。"], "time": 49.32, "end": 53.91}, {"japanese": "Et savoir se détacher de la Terre", "romaji": "[e] [savwar] [sə] [detaʃe] [də] [la] [tεr]", "translation": "也知道如何摆脱地球的束缚", "notes": ["① savoir（[savwar]）：动词不定式，“知道、懂得”；`savoir + infinitif` 表示“会/知道如何做”。", "② se détacher（[sə detaʃe]）：代词式动词不定式，“脱离、摆脱、放下”。", "③ de la Terre：`se détacher de` 固定搭配，“从……脱离”；`de la` 用于阴性名词前。", "④ et（[e]）：连词，把本行与前面的 `avoir`、`prendre` 并列。"], "time": 53.91, "end": 58.2}, {"japanese": "Éphémères", "romaji": "[efemεr]", "translation": "如蜉蝣，转瞬即逝", "notes": ["① 副歌重复，语法上可继续理解为省略的 `nous sommes éphémères`。", "② 法语形容词作表语时需与主语数一致，因此写作复数。", "③ 歌词中反复单词可视为主题锚点，不必每次引入新语法。"], "time": 58.2, "end": 61.28}, {"japanese": "Épris de folie temporaire", "romaji": "[epri] [də] [fɔli] [tɑ̃pɔrεr]", "translation": "被短暂的疯狂迷住", "notes": ["① épris（[epri]）：`éprendre` 的过去分词，形容词化后意为“迷恋的、被……吸引的”；常用结构 `épris de`。", "② folie（[fɔli]）：阴性名词，“疯狂、狂热”。", "③ temporaire（[tɑ̃pɔrεr]）：形容词，“临时的、短暂的”，修饰 `folie`。", "④ `épris de folie temporaire` 继续描述省略主语“我们”的状态。"], "time": 61.28, "end": 65.12}, {"japanese": "Qui nous laisse espérer le ciel", "romaji": "[ki] [nu] [lεs] [εspere] [lə] [sjεl]", "translation": "让我们向往天空", "notes": ["① qui（[ki]）：关系代词，指代前面的 `folie temporaire`，作从句主语。", "② nous（[nu]）：直接宾语代词，“我们”。", "③ laisse（[lεs]）：`laisser` 的直陈式现在时第三人称单数，意为“让、允许”；主语是单数的 `folie`。", "④ espérer（[εspere]）：不定式，“希望、期待”；`laisser + infinitif` 表示“让某人做某事”。"], "time": 65.12, "end": 69.61}, {"japanese": "Et nous attache à des pierres", "romaji": "[e] [nu] [ataʃ] [a] [de] [pjεr]", "translation": "又把我们系在石头上", "notes": ["① attache（[ataʃ]）：`attacher` 的直陈式现在时第三人称单数，意为“系住、绑住、使依附”。", "② nous（[nu]）：直接宾语代词，承接上一行的“我们”。", "③ à des pierres：`attacher à` 表示“把……系到/附着于……”。", "④ pierres（[pjεr]）：阴性复数名词，“石头”，与上一行 `le ciel` 形成向上与向下的对照。"], "time": 69.61, "end": 76.2}, {"japanese": "Éphémères", "romaji": "[efemεr]", "translation": "如蜉蝣，转瞬即逝", "notes": ["① 作为副歌重复，承接“被天空吸引又被石头束缚”的矛盾状态。", "② `é` 发 `[e]`，不是英语式 `[i]`。", "③ 末尾 `-ères` 发 `[εr]`。"], "time": 76.2, "end": 78.94}, {"japanese": "Qui, en prières,", "romaji": "[ki] [ɑ̃] [prijεr]", "translation": "那些在祈祷中的人", "notes": ["① qui（[ki]）：关系代词，继续指代 `éphémères`，可理解为“那些短暂的人们”。", "② en prières（[ɑ̃ prijεr]）：介词短语，“在祈祷中”；`prière` 为阴性名词，“祈祷”。", "③ 逗号把插入状语 `en prières` 隔开，主句动词在下一行。", "④ `prières` 复数末尾 `s` 不发音。"], "time": 78.94, "end": 81.19}, {"japanese": "Trouvent un sens à leurs destins", "romaji": "[truv] [œ̃] [sɑ̃s] [a] [lœr] [dεstɛ̃]", "translation": "为他们的命运找到意义", "notes": ["① trouvent（[truv]）：`trouver` 的直陈式现在时第三人称复数，意为“找到、发现”；主语是上一行的复数 `qui`。", "② sens（[sɑ̃s]）：阳性名词，“意义、方向”；末尾 `s` 通常发音。", "③ à leurs destins：`trouver un sens à...` 表示“为……找到意义”。", "④ leurs（[lœr]）：物主限定词复数，“他们的”；`destins` 为阳性复数，“命运”。"], "time": 81.19, "end": 84.82}, {"japanese": "Si incertains", "romaji": "[si] [ɛ̃sεrtɛ̃]", "translation": "如此不确定", "notes": ["① si（[si]）：副词，“如此、这么”，加强形容词程度。", "② incertains（[ɛ̃sεrtɛ̃]）：阳性复数形容词，“不确定的”；修饰 `destins`。", "③ `in-` 前缀表示否定，`certain` 为“确定的”。", "④ 鼻化元音 `[ɛ̃]` 在 `in-` 与词尾 `-ains` 中都出现。"], "time": 84.82, "end": 90.31}, {"japanese": "On veut croire à des choses éternelles", "romaji": "[ɔ̃] [vф] [krwar] [a] [de] [ʃoz] [etεrnεl]", "translation": "我们愿意相信那些永恒之物", "notes": ["① 重复开头句，形成循环结构。", "② veut（[vф]）：`vouloir` 的直陈式现在时第三人称单数；主语 `on` 后固定用第三人称单数。", "③ croire à：相信某种价值或存在。", "④ éternelles 为阴性复数，配合 `choses`。"], "time": 90.31, "end": 94.8}, {"japanese": "Pour oublier toutes ces choses précaires", "romaji": "[pur] [ublije] [tut] [se] [ʃoz] [prekεr]", "translation": "以便遗忘所有这些易逝之物", "notes": ["① pour + infinitif 表示目的，“为了做……”。", "② oublier 是第一组动词不定式，词尾 `-er` 发 `[e]`。", "③ toutes 与 `choses` 阴性复数一致。", "④ précaires 强调不可靠、无法长久保存。"], "time": 94.8, "end": 99.4}, {"japanese": "Qui ne font que nous ramener", "romaji": "[ki] [nə] [fɔ̃] [kə] [nu] [ramne]", "translation": "那些只会把我们带回", "notes": ["① qui（[ki]）：关系代词，指代 `ces choses précaires`。", "② font（[fɔ̃]）：`faire` 的直陈式现在时第三人称复数。", "③ ne ... que：限制结构，意为“只、仅仅”；不是普通否定。", "④ ramener（[ramne]）：动词不定式，“带回、使回到”；`faire + infinitif` 有“使……做/造成……”的意味。"], "time": 99.4, "end": 103.84}, {"japanese": "Vers notre simple condition de mortel", "romaji": "[vεr] [nɔtr] [sɛ̃pl] [kɔ̃disjɔ̃] [də] [mɔrtεl]", "translation": "带回我们作为凡人的简单处境", "notes": ["① vers（[vεr]）：介词，“朝向、向着”。", "② notre（[nɔtr]）：物主限定词，“我们的”。", "③ condition（[kɔ̃disjɔ̃]）：阴性名词，“状态、处境、身份条件”。", "④ mortel（[mɔrtεl]）：名词或形容词，“凡人、会死的”；`condition de mortel` 指“必死者的处境”。"], "time": 103.84, "end": 109.12}, {"japanese": "Éphémères", "romaji": "[efemεr]", "translation": "如蜉蝣，转瞬即逝", "notes": ["① 本词概括前句的 `condition de mortel`。", "② 发音中 `ph` 发 `[f]`。", "③ 复数 `s` 不发音，单复数听感相同。"], "time": 109.12, "end": 113.37}, {"japanese": "Pris au piège sous l'effet de serre", "romaji": "[pri] [o] [pjεƷ] [su] [lefε] [də] [sεr]", "translation": "陷入温室效应的困境", "notes": ["① pris（[pri]）：`prendre` 的过去分词阳性复数，作形容词，“被困住的”；可理解为省略 `nous sommes pris`。", "② au piège：`à + le` 缩合为 `au`；固定表达，“落入陷阱”。", "③ sous l'effet de：介词结构，“在……的作用/影响下”。", "④ serre（[sεr]）：阴性名词，“温室”；`effet de serre` 是“温室效应”。"], "time": 113.37, "end": 117.42}, {"japanese": "Comme ces fragiles insectes", "romaji": "[kɔm] [se] [fraƷilz] [ɛ̃sεkt]", "translation": "就像那些脆弱的昆虫", "notes": ["① comme（[kɔm]）：连词/介词，“像、如同”。", "② ces（[se]）：指示限定词复数，“这些/那些”。", "③ fragiles（[fraƷil]）：形容词复数，“脆弱的”；在元音开头的 `insectes` 前可联诵为 `[fraƷilz ɛ̃sεkt]`。", "④ insectes（[ɛ̃sεkt]）：阳性复数名词，“昆虫”。"], "time": 117.42, "end": 120.81}, {"japanese": "Qui naissent pour s'éteindre", "romaji": "[ki] [nεs] [pur] [setɛ̃dr]", "translation": "生来就是为了熄灭", "notes": ["① naissent（[nεs]）：`naître` 的直陈式现在时第三人称复数，意为“出生、诞生”，主语为 `insectes`。", "② pour + infinitif：表示目的，“为了……”。", "③ s'éteindre（[setɛ̃dr]）：代词式动词不定式，“熄灭、消亡”；`s'` 是 `se` 在元音前省音。", "④ `naître pour s'éteindre` 强烈表达生命从开始就指向消逝。"], "time": 120.81, "end": 124.25}, {"japanese": "En pleine lumière", "romaji": : "[ki] [nu] [lεs] [εspere] [lə] [sjεl]", "translation": "让我们向往天空", "notes": ["① qui 指代上一行的 `folie temporaire`。", "② laisse（[lεs]）：`laisser` 的直陈式现在时第三人称单数，主语为单数，所以用 `laisse`。", "③ espérer：不定式，“希望、盼望”。", "④ le ciel：阳性名词，“天空、天堂”，在歌词中可兼具现实和精神象征。"], "time": 151.44, "end": 155.73}, {"japanese": "Et nous attache à des pierres", "romaji": "[e] [nu] [ataʃ] [a] [de] [pjεr]", "translation": "又把我们系在石头上", "notes": ["① attache（[ataʃ]）：`attacher` 的直陈式现在时第三人称单数，与前行 `laisse` 并列，主语仍是 `folie temporaire`。", "② nous：宾语代词，位置在变位动词前。", "③ à des pierres：介词 `à` 引出附着点。", "④ pierres 与 `ciel` 形成沉重/上升的对比。"], "time": 155.73, "end": 162.35}, {"japanese": "Éphémères", "romaji": "[efemεr]", "translation": "如蜉蝣，转瞬即逝", "notes": ["① 重复强调人的短暂。", "② 在唱句中常可拉长元音，但标准 IPA 仍写作 `[efemεr]`。", "③ 这里不需要额外变位说明，因为无动词。"], "time": 162.35, "end": 165.14}, {"japanese": "Pour enfin n'être dans ces déserts", "romaji": "[pur] [ɑ̃fɛ̃] [nεtr] [dɑ̃] [se] [dezεr]", "translation": "最终在这些荒漠中", "notes": ["① pour enfin：`pour` 引出目的或结果，`enfin` 表示“终于、最终”。", "② n'être（[nεtr]）：`être` 的否定不定式；`ne` 在元音前省音为 `n'`，这里与下一行 `plus que` 组成限制性否定。", "③ dans ces déserts：`dans` 表示“在……之中”；`déserts` 为阳性复数，“沙漠、荒漠”。", "④ `ces` 指示限定词复数，“这些/那些”。"], "time": 165.14, "end": 168.93}, {"japanese": "Plus qu'un grain de poussière", "romaji": "[plys] [kœ̃] [grɛ̃] [də] [pusjεr]", "translation": "只剩一粒尘埃", "notes": ["① plus que：在 `ne ... plus que` 中表示“只剩、不过是”；这里 `ne` 已在上一行 `n'être` 中出现。", "② un grain（[œ̃ grɛ̃]）：阳性名词短语，“一粒”。", "③ poussière（[pusjεr]）：阴性名词，“尘土、灰尘”。", "④ 整体补全上一行：`n'être ... plus qu'un grain de poussière`，“最终不过是一粒尘埃”。"], "time": 168.93, "end": 172.93}], "duration": 172.93, "warnings": []}</script>
<script>
const DATA = JSON.parse(document.getElementById('lyric-data').textContent);
const lyricsEl = document.getElementById('lyrics'), audio = document.getElementById('audio'), playBtn = document.getElementById('playBtn'), progress = document.getElementById('progress'), timeEl = document.getElementById('time'), currentText = document.getElementById('currentText'), currentNotes = document.getElementById('currentNotes'), audioFile = document.getElementById('audioFile'), resetBtn = document.getElementById('resetBtn');
let simulatedTime = 0, lastTick = 0, playing = false, activeIndex = -1, useAudio = Boolean(audio.getAttribute('src')), showSideNotes = true;
const duration = DATA.duration || 1;
document.getElementById('songTitle').textContent = DATA.title;
document.getElementById('songSubtitle').textContent = DATA.subtitle || '滚动歌词学习页';
function escapeHtml(value) { return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function renderInlineMarkdown(value) {
  return escapeHtml(value)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
}
function splitPhoneticGroups(value) {
  const text = String(value || '').trim();
  if (!text) return [];
  const groups = text.match(/\[[^\]]+\]/g) || [];
  return groups.length && groups.join(' ') === text ? groups : [];
}
function renderLyricMain(item) {
  const words = String(item.japanese || '').trim().split(/\s+/).filter(Boolean);
  const phonetics = splitPhoneticGroups(item.romaji);
  if (words.length && words.length === phonetics.length) {
    const pairs = words.map((word, wordIndex) => `<span class="word-pair"><span class="word-text">${escapeHtml(word)}</span><span class="phonetic">${escapeHtml(phonetics[wordIndex])}</span></span>`).join('');
    return `<div class="aligned-lyrics">${pairs}</div>`;
  }
  return `<div class="jp">${escapeHtml(item.japanese)}</div><div class="romaji">${renderInlineMarkdown(item.romaji || '')}</div>`;
}
function renderLyrics() { lyricsEl.innerHTML = DATA.items.map((item, index) => `<article class="line" data-index="${index}">${renderLyricMain(item)}<div class="translation">${escapeHtml(item.translation || '')}</div><div class="notes">${(item.notes || []).map(note => `<div>${escapeHtml(note)}</div>`).join('')}</div></article>`).join(''); }
function formatTime(value) { const safe = Math.max(0, value || 0), minutes = Math.floor(safe / 60), seconds = Math.floor(safe % 60); return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`; }
function getCurrentTime() { return useAudio ? audio.currentTime : simulatedTime; }
function getDuration() { return useAudio && Number.isFinite(audio.duration) && audio.duration > 0 ? audio.duration : duration; }
function setCurrentTime(value) { const clamped = Math.max(0, Math.min(value, getDuration())); if (useAudio) audio.currentTime = clamped; simulatedTime = clamped; update(); }
function findActiveIndex(time) { let lo = 0, hi = DATA.items.length - 1, result = 0; while (lo <= hi) { const mid = Math.floor((lo + hi) / 2); if (DATA.items[mid].time <= time) { result = mid; lo = mid + 1; } else hi = mid - 1; } return result; }
function setActive(index) { if (index === activeIndex) return; const prev = lyricsEl.querySelector('.line.active'); if (prev) prev.classList.remove('active'); const next = lyricsEl.querySelector(`.line[data-index="${index}"]`); if (next) { next.classList.add('active'); next.scrollIntoView({ behavior: 'smooth', block: 'center' }); } activeIndex = index; const item = DATA.items[index]; currentText.textContent = item ? item.japanese : ''; currentNotes.innerHTML = showSideNotes && item ? (item.notes || []).map(escapeHtml).join('<br>') : ''; }
function update() { const now = getCurrentTime(), total = getDuration(); progress.value = total > 0 ? Math.round((now / total) * 1000) : 0; timeEl.textContent = `${formatTime(now)} / ${formatTime(total)}`; if (DATA.items.length) setActive(findActiveIndex(now)); }
function tick(stamp) { if (!lastTick) lastTick = stamp; const delta = (stamp - lastTick) / 1000; lastTick = stamp; if (playing && !useAudio) { simulatedTime += delta; if (simulatedTime >= duration) { simulatedTime = duration; playing = false; playBtn.textContent = '播放'; } update(); } requestAnimationFrame(tick); }
playBtn.addEventListener('click', async () => { if (useAudio) { if (audio.paused) await audio.play(); else audio.pause(); return; } playing = !playing; playBtn.textContent = playing ? '暂停' : '播放'; });
audio.addEventListener('play', () => { playing = true; playBtn.textContent = '暂停'; }); audio.addEventListener('pause', () => { playing = false; playBtn.textContent = '播放'; }); audio.addEventListener('timeupdate', update); audio.addEventListener('loadedmetadata', update);
audioFile.addEventListener('change', () => { const file = audioFile.files && audioFile.files[0]; if (!file) return; audio.src = URL.createObjectURL(file); useAudio = true; simulatedTime = 0; activeIndex = -1; playBtn.textContent = '播放'; update(); });
progress.addEventListener('input', () => setCurrentTime((Number(progress.value) / 1000) * getDuration()));
resetBtn.addEventListener('click', () => { if (useAudio) audio.pause(); playing = false; playBtn.textContent = '播放'; setCurrentTime(0); });
document.querySelectorAll('.switch').forEach(sw => { const toggle = () => { sw.classList.toggle('on'); const key = sw.dataset.toggle, visible = sw.classList.contains('on'); if (key === 'romaji') document.body.classList.toggle('hide-romaji', !visible); if (key === 'translation') document.body.classList.toggle('hide-translation', !visible); if (key === 'notes') document.body.classList.toggle('hide-notes', !visible); if (key === 'sideNotes') { showSideNotes = visible; activeIndex = -1; update(); } }; sw.addEventListener('click', toggle); sw.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); toggle(); } }); });
renderLyrics(); update(); requestAnimationFrame(tick);
</script></body></html>
