<title>蝋燭 - 滚动歌词</title>
<style>
:root {
  --bg: #f6f3ee; --panel: #fffdfa; --ink: #252525; --muted: #6d6a64;
  --line: #ded8ce; --accent: #c83f3f; --accent-2: #19736b; --shadow: 0 18px 45px rgba(37,37,37,.10);
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; color: var(--ink); background: var(--bg); }
.app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
header { padding: 22px clamp(18px, 4vw, 44px) 14px; border-bottom: 1px solid var(--line); background: rgba(255,253,250,.92); position: sticky; top: 0; z-index: 5; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; max-width: 1180px; margin: 0 auto; }
.title h1 { margin: 0; font-size: 24px; line-height: 1.2; letter-spacing: 0; }
.title p { margin: 7px 0 0; color: var(--muted); font-size: 13px; }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
button, .file-label { appearance: none; border: 1px solid var(--line); background: var(--panel); color: var(--ink); height: 38px; padding: 0 13px; border-radius: 8px; font: inherit; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
button:hover, .file-label:hover { border-color: #c9bfb0; }
button.primary { background: var(--accent); color: white; border-color: var(--accent); min-width: 84px; justify-content: center; }
input[type="file"] { display: none; }
main { max-width: 1180px; width: 100%; margin: 0 auto; padding: 22px clamp(14px, 4vw, 44px) 24px; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; min-height: 0; }
.stage { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); min-height: calc(100vh - 190px); max-height: calc(100vh - 190px); overflow: hidden; position: relative; }
.lyrics { height: 100%; overflow-y: auto; scroll-behavior: smooth; padding: 34vh 34px 36vh; }
.line { max-width: 760px; margin: 0 auto 28px; padding: 16px 18px; border-left: 3px solid transparent; border-radius: 8px; opacity: .48; transform: scale(.985); transition: opacity .22s ease, transform .22s ease, background .22s ease, border-color .22s ease; }
.line.active { opacity: 1; transform: scale(1); background: #fff7f2; border-color: var(--accent); }
.jp { font-size: 24px; line-height: 1.55; font-weight: 700; }
.line.active .jp { font-size: 30px; }
.romaji { margin-top: 8px; color: var(--accent-2); font-size: 16px; line-height: 1.55; }
.romaji strong { color: #0f5f59; font-weight: 800; }
.romaji em { color: #8b5e27; font-style: italic; }
.translation { margin-top: 8px; color: #4c4840; font-size: 17px; line-height: 1.55; }
.notes { margin-top: 12px; padding-top: 10px; border-top: 1px solid #eadfd4; color: #5c5147; font-size: 14px; line-height: 1.75; }
.notes div { margin: 3px 0; }
.side { display: flex; flex-direction: column; gap: 14px; }
.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
.panel h2 { margin: 0 0 12px; font-size: 15px; }
.toggles { display: grid; gap: 10px; }
.toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 14px; }
.switch { width: 48px; height: 26px; border-radius: 999px; border: 1px solid #cfc5b7; background: #e8e0d6; position: relative; cursor: pointer; flex: 0 0 auto; }
.switch::after { content: ""; position: absolute; width: 20px; height: 20px; left: 2px; top: 2px; border-radius: 50%; background: white; box-shadow: 0 1px 3px rgba(0,0,0,.20); transition: transform .18s ease; }
.switch.on { background: var(--accent-2); border-color: var(--accent-2); }
.switch.on::after { transform: translateX(22px); }
.now { color: var(--muted); font-size: 13px; line-height: 1.6; }
.now strong { display: block; color: var(--ink); font-size: 18px; margin-bottom: 8px; }
.current-notes { margin-top: 10px; color: #574c43; font-size: 14px; line-height: 1.7; }
footer { border-top: 1px solid var(--line); background: rgba(255,253,250,.96); padding: 13px clamp(18px, 4vw, 44px); }
.transport { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 14px; }
.time { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; min-width: 102px; text-align: right; }
.progress { width: 100%; accent-color: var(--accent); }
body.hide-romaji .romaji, body.hide-translation .translation, body.hide-notes .notes { display: none; }
@media (max-width: 860px) { .topbar { align-items: flex-start; flex-direction: column; } .controls { justify-content: flex-start; } main { grid-template-columns: 1fr; } .stage { min-height: 58vh; max-height: 58vh; } .lyrics { padding-left: 16px; padding-right: 16px; } .line { padding: 14px; margin-bottom: 20px; } .jp { font-size: 21px; } .line.active .jp { font-size: 24px; } .transport { grid-template-columns: auto 1fr; } .time { grid-column: 1 / -1; text-align: left; } }
</style>

</div><audio id="audio" src="音频.mp3"></audio><script id="lyric-data" type="application/json">{"title": "蝋燭", "subtitle": "蜡烛 / 作词: 久下真音 / 作曲: 久下真音", "items": [{"japanese": "パッと咲いたHarmony", "romaji": "**pa** tto sa i ta **Har**mony", "translation": "突然绽放的和音", "notes": ["①パッと（pa tto）：拟态词，瞬间发生的样子。", "②咲いた（sa i ta）：原形 咲く（さく）的过去式，意为（花）开"], "time": 0.0, "end": 2.6710000000000003}, {"japanese": "別にパンチラインでもないのに", "romaji": "be tsu ni **pa n** chi ra i n de mo **na i** no ni", "translation": "并不算是什么点睛之笔", "notes": ["①別に（ be tsu ni ）：并（不），特别（不）。与后续的否定搭配，表示“也并不是…”、“也没什么特别的…”", "②パンチライン（ pa n chi ra i n ）：名词，来自英语“punch line”，指（笑话的）妙语、点睛之笔。", "③のに：接续助词，逆接，表示转折，意为“尽管…却…”。"], "time": 2.6710000000000003, "end": 5.9030000000000005}, {"japanese": "キャンドルたちの灯り", "romaji": "**kya n** do ru ta chi no **a** ka ri", "translation": "烛火的光亮", "notes": ["①キャンドル（kya n do ru）：外来語，来自英语 \"candle\"，意为“蜡烛”。", "②たち（ta chi）：表示复数。", "④灯り（あかり / a ka ri）：名词，意为“光、灯光、亮光”。动词「灯る」（あかる，意为“点亮”“发光”）的连用形名词化形式。"], "time": 5.9030000000000005, "end": 8.435}, {"japanese": "名前も知らない香水の香り", "romaji": "na **ma e** mo shi ra na i **ko u** su i no ka o ri", "translation": "与不知其名的香水味", "notes": ["①名前（なまえ / na ma e）：名词，意为“名字、名称”。", "②も（mo）：助词，表示“甚至/连…也”，用于强调范围。", "③知らない（しらない / shi ra na i）：动词「知る」的否定形，表示“不知道”或“不认识”。", "④香水（こうすい / ko u su i）：名词，意为“香水”。与中文同源，采用音读。", "⑥香り（かおり / ka o ri）：名词，意为“香味、香气”，常用于描述嗅觉印象。来源于日语固有词，“香”采用训读（ka o），因此与上条中音读（ko u）不同。"], "time": 8.435, "end": 11.579}, {"japanese": "なんか良いよね二人", "romaji": "**na n** ka yo(1) i yo ne **fu** ta ri", "translation": "总感觉很好的两人", "notes": ["①なんか（na n ka）：副词，口语化的模糊表述，表示“总觉得/有点”，弱化断言。", "②良いよね（よいよね / yo i yo ne）：形容词+语尾，意为“很好吧”，“よね\"用于确认共感或期待对方同意。“良い”在口语里常被读作（いい / i i），在歌曲中亦如此。", "③二人（ふたり / fu ta ri）：名词，意为“两人/两个人”。"], "time": 11.579, "end": 13.782}, {"japanese": "何も話すわけじゃないのに", "romaji": "na ni mo **ha** na su wa ke ja **na i** no ni", "translation": "虽然也不是有什么话要说", "notes": ["①何も（なにも / na ni mo）：副词，常与否定搭配，意为“什么也不…”，强调没有任何事情。", "②話すわけじゃない（はなすわけじゃない / ha na su wa ke ja na i）：结构：动词辞书形/ない形 + わけじゃない，`わけ`表“理由/道理”；意为“并非为了/并不是有此理由”，用于弱化断言或说明非目的性。整体可直译为\"并没有什么理由说\"。", "③のに（no ni）：接续助词，表示逆接“虽然…却…”。"], "time": 13.782, "end": 16.645}, {"japanese": "だけど···まだ切らなくてもいい？", "romaji": "da ke do···**ma** da ki ra na ku **te** mo i i?", "translation": "不过…可以先不要挂断吗？", "notes": ["①だけど（だけど / da ke do）：接续词，口语逆接，意为“不过/但是”，转折并柔和语气。", "②まだ（ま だ / ma da）：副词，表示“仍然/还”，用于强调动作尚未结束或继续状态。", "③切らなくてもいい（きらなくてもいい / ki ra na ku te mo i i）：结构：动词未然形 + なくてもいい，意为“可以不…/不用…也行”；“切ら”，原形“切る”，在此特指“挂断（电话）”；“なく”，形容词“ない”的连用形；“てもいい”，“即使…也可以”。"], "time": 16.645, "end": 19.204}, {"japanese": "Yeah", "romaji": "Yeah", "translation": "", "notes": [], "time": 19.204, "end": 20.829}, {"japanese": "ゆらり動き出すHeart Beat", "romaji": "yu **ra** ri **u go** ki da su **Heart** Beat", "translation": "摇摇晃晃跳动的心跳", "notes": ["①ゆらり（yu ra ri）：拟态词，表示轻轻摇晃或摇曳的样子，常用于描述不稳或柔和的动作。", "②動き出す（うごきだす / u go ki da su）：动词复合，动词连用形+出す，表示动作开始或突然开始发生。"], "time": 20.829, "end": 24.536}, {"japanese": "そう繰り返すChordに", "romaji": "so u ku **ri** ka e su **Chord** ni", "translation": "反反复复回响的和弦", "notes": ["①そう（so u）：指示副词，指代前述情景或“那样/如此”。", "②繰り返す（くりかえす / ku ri ka e su）：动词，意为“反复、反复做”，可表示不断重现的动作。"], "time": 24.536, "end": 27.461}, {"japanese": "吸って吐いても忘れてしまうよなFantasy", "romaji": "**su** tte ha i te mo wa **su** re te shi ma u yo na Fantasy", "translation": "呼吸间就会忘记的幻想", "notes": ["①吸って吐いて（すってはいて / su tte ha i te）：“吸って”原形“吸う”，“吐いて”原形“はく”，「て」形用于表示动作的相继发生，描述“吸气然后吐气”的连续动作。", "②てしまう：表示发生了不希望发生的事，带有遗憾等感情。", "③よな：句尾表现感叹。"], "time": 27.461, "end": 32.882}, {"japanese": "ただ（ただ）今（今）繋がるだけでいいから", "romaji": "ta **da** (ta da) i **ma** (i ma) tsu **na** ga ru da **ke** de i i ka **ra**", "translation": "只是（只是）现在（现在）想和你连接在一起", "notes": ["①ただ（ta da）：副词，意为“仅仅/只是”，在这里起强调限定作用。", "②繋がる（つながる / tsu na ga ru）：动词原形，意为“连接/保持联络”，与中文“连接”语义接近但更侧重关系状态。", "②だけでいい（da ke de i i）：结构：动词原形 + だけでいい，意为“只要……就足够/就行”。"], "time": 32.882, "end": 38.908}, {"japanese": "甘いのも悪くないな（ああ）", "romaji": "a ma **i** no mo wa *ru* ku na i **na** (a a)", "translation": "甜一点也不坏呢（Ah）", "notes": ["①甘い（あまい / a ma i）：形容词，甜。", "②〜のも（のも）：名词化结构，把形容词或句子名词化以表示“……的（行为/状态）也……”。", "③悪く（わるく / wa ru ku）：原形“悪い”（わるい）的连用形。"], "time": 38.908, "end": 41.735}, {"japanese": "まどろむサイダー", "romaji": "ma do *ro* mu sa i **daa**", "translation": "入睡前的苏打水", "notes": ["①まどろむ（ma do ro mu）：动词，意为“半睡半醒、昏昏欲睡”，描绘一种意识朦胧、身心放松的短暂休息状态。", "②サイダー（sa i daa）：来自英语“cider”，原意苹果酒，在日语中常指清爽的汽水/苏打。"], "time": 41.735, "end": 43.384}, {"japanese": "どこまでもSlowly Slowlyで", "romaji": "do *ko* ma de mo **Slow**ly Slowly *de*", "translation": "无论何处 总是缓缓地", "notes": ["①どこまでも（do ko ma de mo）：副词，表示“无论到何处/始终”，含无限延续感。", "③で：格助词，表示方式或状态“以…的方式/在…状态下”。"], "time": 43.384, "end": 45.796}, {"japanese": "真夜中にCalling Callingです", "romaji": "ma *yo* na ka ni **Call**ing Calling *de* su", "translation": "在午夜时分拨出电话", "notes": ["①真夜中（まよなか / ma yo na ka）：时间表达，意为“深夜”，午夜12点前后。"], "time": 45.796, "end": 48.573}, {"japanese": "あとね、5分だけ5分だけってさ（Stay）", "romaji": "a *to* ne, **go** fun da *ke* **go** fun da *ke* tte **sa** (Stay)", "translation": "再五分钟 再聊五分钟吧", "notes": ["①あとね（a to ne）：口语化插入语，表示补充或提出请求，语气亲切。", "②だけ（da ke）：仅仅，只有。", "③ってさ：口语终助词，引用或强调说法，带随意的叙述风格。"], "time": 48.573, "end": 55.038}, {"japanese": "乗り乗りで", "romaji": "**no** ri no ri **de**", "translation": "正在兴头上呢", "notes": ["①乗り乗り（のりのり / no ri no ri）：拟态词，表示兴致高涨状态。"], "time": 55.038, "end": 56.737}, {"japanese": "「おやすみ」じゃ、ねえ 終わりたくないね", "romaji": "\"o *ya* su mi\" ja, **ne e** o *wa* ri **ta** ku *na* i **ne**", "translation": "「晚安」什么的才不要 我还不想结束呢", "notes": ["①じゃ：`じゃ`为`では`的口语形，表示“就……的话”。", "②終わりたくない（おわりたくない / o wa ri ta ku na i）：动词原形“終わる”；变为愿望形“終わりたい”（连用形 + たい）；再变为否定形式“終わりたくない”。意为“不想结束”。"], "time": 56.737, "end": 62.337}, {"japanese": "黙って続けて良い夢が見れるまで", "romaji": "*da* m**a** tte tsu zu *ke* te i i **yu** me ga mi *re* ru ma de", "translation": "默默地继续着 直到进入甜美梦乡为止", "notes": ["①黙って続けて（だまってつづけて / da ma tte tsu zu ke te）：`黙る`的て形+続ける，表示“默默持续进行某动作”。", "②見れる（みれる / mi re ru）：动词原形“見る”的可能态，口语中常用`見れる`代替更正式的`見られる`。直译为“好梦能够被看见”，可意译为“能做个好梦”。"], "time": 62.337, "end": 66.097}, {"japanese": "パッと咲いたHarmony", "romaji": "**pa** tto sa i ta **Har**mony", "translation": "突然绽放的和音", "notes": ["①パッと（pa tto）：拟态词，瞬间发生的样子。", "②咲いた（sa i ta）：原形 咲く（さく）的过去式，意为（花）开"], "time": 66.097, "end": 68.347}, {"japanese": "別にパンチラインでもないのに", "romaji": "be tsu ni **pa n** chi ra i n de mo **na i** no ni", "translation": "并不算是什么点睛之笔", "notes": ["①別に（ be tsu ni ）：并（不），特别（不）。与后续的否定搭配，表示“也并不是…”、“也没什么特别的…”", "②パンチライン（ pa n chi ra i n ）：名词，来自英语“punch line”，指（笑话的）妙语、点睛之笔。", "③のに：接续助词，逆接，表示转折，意为“尽管…却…”。"], "time": 68.347, "end": 71.532}, {"japanese": "キャンドルたちの灯り", "romaji": "**kya n** do ru ta chi no **a** ka ri", "translation": "烛火的光亮", "notes": ["①キャンドル（kya n do ru）：外来語，来自英语 \"candle\"，意为“蜡烛”。", "②たち（ta chi）：表示复数。", "④灯り（あかり / a ka ri）：名词，意为“光、灯光、亮光”。动词「灯る」（あかる，意为“点亮”“发光”）的连用形名词化形式。"], "time": 71.532, "end": 73.97}, {"japanese": "名前も知らない香水の香り", "romaji": "na **ma e** mo shi ra na i **ko u** su i no ka o ri", "translation": "与不知其名的香水味", "notes": ["①名前（なまえ / na ma e）：名词，意为“名字、名称”。", "②も（mo）：助词，表示“甚至/连…也”，用于强调范围。", "③知らない（しらない / shi ra na i）：动词「知る」的否定形，表示“不知道”或“不认识”。", "④香水（こうすい / ko u su i）：名词，意为“香水”。与中文同源，采用音读。", "⑥香り（かおり / ka o ri）：名词，意为“香味、香气”，常用于描述嗅觉印象。来源于日语固有词，“香”采用训读（ka o），因此与上条中音读（ko u）不同。"], "time": 73.97, "end": 77.02}, {"japanese": "なんか良いよね二人", "romaji": "**na n** ka yo(1) i yo ne **fu** ta ri", "translation": "总感觉很好的两人", "notes": ["①なんか（na n ka）：副词，口语化的模糊表述，表示“总觉得/有点”，弱化断言。", "②良いよね（よいよね / yo i yo ne）：形容词+语尾，意为“很好吧”，“よね\"用于确认共感或期待对方同意。“良い”在口语里常被读作（いい / i i），在歌曲中亦如此。", "③二人（ふたり / fu ta ri）：名词，意为“两人/两个人”。"], "time": 77.02, "end": 79.218}, {"japanese": "それを確かめ合うように", "romaji": "so re wo **ta** shi *ka* me a u **yo** u ni", "translation": "似乎是为了互相确认什么", "notes": ["①それ（so re）：指示代词，意为“那个/那件事”，指代前文提到的内容。", "②確かめ合う（たしかめあう / ta shi ka me a u）：复合动词，「確かめる」（确认）+「合う」（互相），意为“互相确认”。", "③ように（yo u ni）：助词，表示“像……一样”或“为了……”。"], "time": 79.218, "end": 82.043}, {"japanese": "今日もStarlightは夜空に", "romaji": "kyo u mo **Star**light wa yo **zo** ra ni", "translation": "今日 夜空中也星光闪烁", "notes": ["①夜空（よぞら / yo zo ra）：名词，夜空。“夜”（よる）、“空”（そら）在连读时发生连浊，故读作“よぞら”。"], "time": 82.043, "end": 84.685}, {"japanese": "Yeah", "romaji": "Yeah", "translation": "", "notes": [], "time": 84.685, "end": 88.078}, {"japanese": "「落ち着くその声がいい」", "romaji": "\"**o** chi *tsu* ku so no **ko e** ga i i\"", "translation": "「那让人安心的声音 真好啊」", "notes": ["①落ち着く（おちつく / o chi tsu ku）：动词，意为“平静下来、安定”，在此形容“让人安心”的感觉。", "②声（こえ / ko e）：名词，意为“声音”。"], "time": 88.078, "end": 90.186}, {"japanese": "って思ってるはずだねお互いに", "romaji": "tte o **mo** tte ru ha *zu* da ne o **ta** ga i ni", "translation": "彼此都是这样想着", "notes": ["①って（tte）：助词，口语化的引用标记。", "②思ってる（おもってる / o mo tte ru）：动词「思う」的て形+いる，表示持续的“想着”。", "③はず（はず / ha zu）：名词，意为“应该/理应”，表示推测。", "④お互いに（おたがいに / o ta ga i ni）：副词，意为“彼此/互相”。"], "time": 90.186, "end": 92.998}, {"japanese": "なんて思っていい？それは本当に", "romaji": "na n te o **mo** tte i i? so re wa **ho n** to u ni", "translation": "该怎么想才好呢？那是真的", "notes": ["①なんて（なんて / na n te）：感叹词，表示“该如何/怎么”，带有疑问语气。", "②本当に（ほんとうに / ho n to u ni）：副词，意为“真的/确实”，中文语境下常见为“红豆泥”。"], "time": 92.998, "end": 95.517}, {"japanese": "なら嬉しい", "romaji": "na ra u **re** shi i", "translation": "很高兴呢", "notes": ["①なら（なら / na ra）：助动词，表示对前文“それは本当に”的假设。", "②嬉しい（うれしい / u re shi i）：形容词，意为“高兴/开心”。"], "time": 95.517, "end": 98.646}, {"japanese": "3話で止まったままのあのドラマ", "romaji": "**sa n** wa *de* to ma tta **ma** ma no a *no* do ra ma", "translation": "停止在第三集的电视剧", "notes": ["①話（わ / wa）：量词，表示“集/话”。", "②止まった（とまった / to ma tta）：动词「止まる」的过去形，意为“停止/停下”。", "③まま（まま / ma ma）：名词，意为“保持原样”，表示状态的持续。", "④ドラマ（ドラマ / do ra ma）：外来语，来自英语“drama”，意为“电视剧/戏剧”。"], "time": 98.646, "end": 101.641}, {"japanese": "最終回はなんかまだ見たくなくて", "romaji": "**sa i** shu u ka i wa **na n** ka ma da **mi** ta ku na **ku** te", "translation": "还不想看到大结局", "notes": ["①最終回（さいしゅうかい / sa i shu u ka i）：名词，意为“最终回/大结局”。", "②なんか（なんか / na n ka）：副词，口语化的模糊表述，意为“总觉得/有点”。", "③見たくなくて（みたくなくて / mi ta ku na ku te）：动词「見る」的愿望形「見たい」的否定形+て形，意为“不想看”。 这里使用て形表方式。"], "time": 101.641, "end": 104.144}, {"japanese": "そんなとこまで同じ", "romaji": "**so n** n : ["①なんか（na n ka）：副词，口语化的模糊表述，表示“总觉得/有点”，弱化断言。", "②良いよね（よいよね / yo i yo ne）：形容词+语尾，意为“很好吧”，“よね\"用于确认共感或期待对方同意。“良い”在口语里常被读作（いい / i i），在歌曲中亦如此。", "③二人（ふたり / fu ta ri）：名词，意为“两人/两个人”。"], "time": 172.509, "end": 174.554}, {"japanese": "それを確かめ合うように", "romaji": "so re wo **ta** shi *ka* me a u **yo** u ni", "translation": "似乎是为了互相确认什么", "notes": ["①それ（so re）：指示代词，意为“那个/那件事”，指代前文提到的内容。", "②確かめ合う（たしかめあう / ta shi ka me a u）：复合动词，「確かめる」（确认）+「合う」（互相），意为“互相确认”。", "③ように（yo u ni）：助词，表示“像……一样”或“为了……”。"], "time": 174.554, "end": 177.398}, {"japanese": "今日もStarlightは夜空に", "romaji": "kyo u mo **Star**light wa yo **zo** ra ni", "translation": "今日 夜空中也星光闪烁", "notes": ["①夜空（よぞら / yo zo ra）：名词，夜空。“夜”（よる）、“空”（そら）在连读时发生连浊，故读作“よぞら”。"], "time": 177.398, "end": 180.207}, {"japanese": "Yeah", "romaji": "Yeah", "translation": "", "notes": [], "time": 180.207, "end": 184.207}], "duration": 184.207, "warnings": []}</script>
<script>
const DATA = JSON.parse(document.getElementById('lyric-data').textContent);
const lyricsEl = document.getElementById('lyrics'), audio = document.getElementById('audio'), playBtn = document.getElementById('playBtn'), progress = document.getElementById('progress'), timeEl = document.getElementById('time'), currentText = document.getElementById('currentText'), currentNotes = document.getElementById('currentNotes'), audioFile = document.getElementById('audioFile'), resetBtn = document.getElementById('resetBtn');
let simulatedTime = 0, lastTick = 0, playing = false, activeIndex = -1, useAudio = Boolean(audio.getAttribute('src')), showSideNotes = true;
const duration = DATA.duration || 1;
document.getElementById('songTitle').textContent = DATA.title;
document.getElementById('songSubtitle').textContent = DATA.subtitle || '滚动歌词学习页';
function escapeHtml(value) { return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function renderInlineMarkdown(value) {
  return escapeHtml(value)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
}
function renderLyrics() { lyricsEl.innerHTML = DATA.items.map((item, index) => `<article class="line" data-index="${index}"><div class="jp">${escapeHtml(item.japanese)}</div><div class="romaji">${renderInlineMarkdown(item.romaji || '')}</div><div class="translation">${escapeHtml(item.translation || '')}</div><div class="notes">${(item.notes || []).map(note => `<div>${escapeHtml(note)}</div>`).join('')}</div></article>`).join(''); }
function formatTime(value) { const safe = Math.max(0, value || 0), minutes = Math.floor(safe / 60), seconds = Math.floor(safe % 60); return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`; }
function getCurrentTime() { return useAudio ? audio.currentTime : simulatedTime; }
function getDuration() { return useAudio && Number.isFinite(audio.duration) && audio.duration > 0 ? audio.duration : duration; }
function setCurrentTime(value) { const clamped = Math.max(0, Math.min(value, getDuration())); if (useAudio) audio.currentTime = clamped; simulatedTime = clamped; update(); }
function findActiveIndex(time) { let lo = 0, hi = DATA.items.length - 1, result = 0; while (lo <= hi) { const mid = Math.floor((lo + hi) / 2); if (DATA.items[mid].time <= time) { result = mid; lo = mid + 1; } else hi = mid - 1; } return result; }
function setActive(index) { if (index === activeIndex) return; const prev = lyricsEl.querySelector('.line.active'); if (prev) prev.classList.remove('active'); const next = lyricsEl.querySelector(`.line[data-index="${index}"]`); if (next) { next.classList.add('active'); next.scrollIntoView({ behavior: 'smooth', block: 'center' }); } activeIndex = index; const item = DATA.items[index]; currentText.textContent = item ? item.japanese : ''; currentNotes.innerHTML = showSideNotes && item ? (item.notes || []).map(escapeHtml).join('<br>') : ''; }
function update() { const now = getCurrentTime(), total = getDuration(); progress.value = total > 0 ? Math.round((now / total) * 1000) : 0; timeEl.textContent = `${formatTime(now)} / ${formatTime(total)}`; if (DATA.items.length) setActive(findActiveIndex(now)); }
function tick(stamp) { if (!lastTick) lastTick = stamp; const delta = (stamp - lastTick) / 1000; lastTick = stamp; if (playing && !useAudio) { simulatedTime += delta; if (simulatedTime >= duration) { simulatedTime = duration; playing = false; playBtn.textContent = '播放'; } update(); } requestAnimationFrame(tick); }
playBtn.addEventListener('click', async () => { if (useAudio) { if (audio.paused) await audio.play(); else audio.pause(); return; } playing = !playing; playBtn.textContent = playing ? '暂停' : '播放'; });
audio.addEventListener('play', () => { playing = true; playBtn.textContent = '暂停'; }); audio.addEventListener('pause', () => { playing = false; playBtn.textContent = '播放'; }); audio.addEventListener('timeupdate', update); audio.addEventListener('loadedmetadata', update);
audioFile.addEventListener('change', () => { const file = audioFile.files && audioFile.files[0]; if (!file) return; audio.src = URL.createObjectURL(file); useAudio = true; simulatedTime = 0; activeIndex = -1; playBtn.textContent = '播放'; update(); });
progress.addEventListener('input', () => setCurrentTime((Number(progress.value) / 1000) * getDuration()));
resetBtn.addEventListener('click', () => { if (useAudio) audio.pause(); playing = false; playBtn.textContent = '播放'; setCurrentTime(0); });
document.querySelectorAll('.switch').forEach(sw => { const toggle = () => { sw.classList.toggle('on'); const key = sw.dataset.toggle, visible = sw.classList.contains('on'); if (key === 'romaji') document.body.classList.toggle('hide-romaji', !visible); if (key === 'translation') document.body.classList.toggle('hide-translation', !visible); if (key === 'notes') document.body.classList.toggle('hide-notes', !visible); if (key === 'sideNotes') { showSideNotes = visible; activeIndex = -1; update(); } }; sw.addEventListener('click', toggle); sw.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); toggle(); } }); });
renderLyrics(); update(); requestAnimationFrame(tick);
</script></body></html>
